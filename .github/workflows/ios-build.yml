name: iOS Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Build
      run: |
        cd TestApp
        xcodebuild -project TestApp.xcodeproj \
          -scheme TestApp \
          -sdk iphoneos \
          -configuration Release \
          -archivePath $PWD/build/TestApp.xcarchive \
          -destination 'generic/platform=iOS' \
          clean archive \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO
    
    - name: Create IPA
      run: |
        cd TestApp
        mkdir -p Payload
        cp -r build/TestApp.xcarchive/Products/Applications/TestApp.app Payload/
        zip -r TestApp.ipa Payload
        rm -rf Payload
    
    - name: Archive build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: TestApp-iOS
        path: TestApp/TestApp.ipa
